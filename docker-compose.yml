services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lol-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-81}:80"
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
    volumes:
      - ./controllers/uploads:/var/www/html/controllers/uploads
    networks:
      - frontend-net
      - backend-net
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: lol-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  
volumes:
  mysql_data:

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true 